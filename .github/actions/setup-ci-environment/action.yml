name: Setup CI Environment
description: Set up Python, Node.js, optional ffmpeg, and install dependencies.

inputs:
  node-version:
    description: Node.js version to use.
    required: true
  arch:
    description: Target architecture for dependency installation.
    required: true
  install-ffmpeg:
    description: Whether to install ffmpeg on Windows.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: yarn

    - name: Install ffmpeg
      if: ${{ runner.os == 'Windows' && inputs.install-ffmpeg == 'true' }}
      shell: bash
      run: choco install ffmpeg --yes --no-progress

    - name: Install and build dependencies
      shell: bash
      run: yarn
      env:
        npm_config_arch: ${{ inputs.arch }}
        TARGET_ARCH: ${{ inputs.arch }}

    - name: Install cross-compilation copilot package
      shell: bash
      env:
        npm_config_arch: ${{ inputs.arch }}
        TARGET_ARCH: ${{ inputs.arch }}
      run: |
        # Map runner.os to Node's process.platform naming
        case "$RUNNER_OS" in
          macOS)   PLATFORM=darwin ;;
          Windows) PLATFORM=win32 ;;
          Linux)   PLATFORM=linux ;;
        esac

        # Pin to the exact version already resolved for the @github/copilot
        # meta package, otherwise yarn add fetches the latest published version
        # and the binary drifts ahead of the locked version that the license
        # override (script/licenses/license-overrides.ts) generates keys for.
        VERSION=$(node -p "require('./app/node_modules/@github/copilot/package.json').version")
        PKG="@github/copilot-${PLATFORM}-${{ inputs.arch }}@${VERSION}"

        if [ ! -d "app/node_modules/@github/copilot-${PLATFORM}-${{ inputs.arch }}" ]; then
          echo "Installing ${PKG} for cross-compilation…"
          cd app && yarn add --optional --ignore-platform --ignore-scripts ${PKG}

          PATH="${GITHUB_WORKSPACE}/node_modules/.bin:$PATH" \
            npm rebuild desktop-notifications desktop-trampoline
        fi

    - name: Install arm64 cross-compilation tools
      if: ${{ runner.os == 'Linux' && inputs.arch == 'arm64' }}
      shell: bash
      run: |
        sudo apt-get update -q
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

    - name: Rebuild native modules for arm64
      if: ${{ runner.os == 'Linux' && inputs.arch == 'arm64' }}
      shell: bash
      env:
        CC: aarch64-linux-gnu-gcc
        CXX: aarch64-linux-gnu-g++
      run: |
        NODE_GYP=node_modules/node-gyp/bin/node-gyp.js

        # Rebuild printenvz (standalone executable, root node_modules)
        (cd node_modules/printenvz && node ../../$NODE_GYP rebuild --arch=arm64)

        # Rebuild process-proxy: its install script only builds for process.arch (x64),
        # so we invoke node-gyp directly and copy the arm64 binary to the bin/ directory.
        (cd node_modules/process-proxy && \
          node ../../$NODE_GYP rebuild --arch=arm64 && \
          cp build/Release/process-proxy-linux-arm64 bin/process-proxy-linux-arm64)

        # Rebuild desktop-trampoline (standalone executables, app/node_modules)
        (cd app/node_modules/desktop-trampoline && node ../../../$NODE_GYP rebuild --arch=arm64)

        # Rebuild desktop-notifications (.node addon, app/node_modules)
        (cd app/node_modules/desktop-notifications && node ../../../$NODE_GYP rebuild --arch=arm64)
